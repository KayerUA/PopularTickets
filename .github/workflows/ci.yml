# Проверка при push / PR в main. Production-сборку и деплой делает Vercel после связки репозитория (см. README → «Автодеплой»).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: ESLint (workspaces)
        run: npm run lint --workspaces --if-present

      - name: JSON-LD schema guard
        run: npm run check:jsonld

      - name: Env gate script
        run: npm run check:env
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
          CHECKOUT_BYPASS_PAYMENT: "true"

      - name: TypeScript (tickets)
        run: npx tsc --noEmit -p apps/tickets/tsconfig.json

      - name: TypeScript (poet)
        run: npx tsc --noEmit -p apps/poet/tsconfig.json
